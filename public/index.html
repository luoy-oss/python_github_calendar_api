<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 贡献日历 API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0;
            padding: 40px 20px;
            background-color: #f9f9fa;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            margin-top: 0;
            color: #1890ff;
            font-size: 24px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        p {
            margin-bottom: 15px;
            font-size: 16px;
        }
        .endpoint {
            margin-bottom: 12px;
            font-family: Consolas, Monaco, "Andale Mono", monospace;
            font-size: 15px;
        }
        .method {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
            min-width: 45px;
            text-align: center;
        }
        .get { background-color: #e6f7ff; color: #096dd9; border: 1px solid #91d5ff; }
        .post { background-color: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
        
        a {
            color: #1890ff;
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: #40a9ff;
            text-decoration: underline;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub 贡献日历 API</h1>
        <p>当你看到这段文字时，说明服务已成功启动</p>
        <p>请使用以下API接口：</p>  
        <div class="endpoint">
            <span class="method get">GET</span> /api?user={username} - 获取指定 GitHub 用户的贡献数据
        </div>
      
    </div>
</body>
</html>
